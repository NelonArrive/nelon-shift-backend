version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nelonshift-postgres
    environment:
      POSTGRES_DB: nelonshift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: nelonshift-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nelonshift-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ===================================
# Команды для работы:
# ===================================
#
# Запустить всё:
# docker-compose up -d
#
# Запустить только PostgreSQL и Redis (без UI):
# docker-compose up -d postgres redis
#
# Посмотреть логи:
# docker-compose logs -f
#
# Остановить:
# docker-compose down
#
# Остановить и удалить данные:
# docker-compose down -v
#
# ===================================
# Доступ к сервисам:
# ===================================
# PostgreSQL:     localhost:5432
# Redis:          localhost:6379
# pgAdmin:        http://localhost:5050 (admin@admin.com / admin)
# Redis Commander: http://localhost:8081
#
# ===================================
# application.yml должен быть:
# ===================================
# spring:
#   datasource:
#     url: jdbc:postgresql://localhost:5432/nelonshift
#     username: postgres
#     password: postgres
#   redis:
#     host: localhost
#     port: 6379